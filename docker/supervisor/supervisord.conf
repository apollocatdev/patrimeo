[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log

[program:frankenphp]
command=/usr/local/bin/frankenphp run --config /etc/frankenphp/Caddyfile
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/frankenphp.log
stderr_logfile=/var/log/supervisor/frankenphp.err

[program:cron]
command=/usr/sbin/cron -f
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/cron.log
stderr_logfile=/var/log/supervisor/cron.err

[program:queue-worker]
directory=/app
command=php artisan queue:work --tries=1 --timeout=600
user=www-data
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/queue.log
stderr_logfile=/var/log/supervisor/queue.err
stopwaitsecs=3600